# Tmux config file

# Removing the default prefix keybind
unbind-key C-b

# Changing prefix to C-t for consistency.
# It doesn't override any important Emacs keybindings. Just like ratpoison.
set -g prefix 'C-t'
bind-key -r 'C-t' send-prefix

# Set tmux-continuum to restore previous session on tmux startup:
set -g @continuum-restore 'on'

# Highlight active window
# set-window-option -g window-status-current-bg red

#----QUICKER HOTKEYS-----------------------------------------------------------
# Quicker pane navigation without the prefix key
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window navigation without prefix
bind -n M-n next-window          # Alt+n próxima janela
bind -n M-p previous-window     # Alt+p janela anterior
bind -n M-1 select-window -t 1  # Alt+1-9 pula para janela pelo número
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind    Tab last-window          # prefix + Tab alterna para última janela

# Quicker copy and paste
bind -n C-] copy-mode
bind      y paste-buffer
# Additional convenient copy shortcuts
bind -n M-c copy-mode              # Alt+c to enter copy mode quickly
bind -n M-v paste-buffer           # Alt+v to paste quickly
bind -n © copy-mode                # AltGr+c (copyright symbol) to enter copy mode
bind -n „ paste-buffer             # AltGr+v to paste quickly

# Quicker splits
bind-key - split-window -v  -c '#{pane_current_path}'
bind-key / split-window -h  -c '#{pane_current_path}'

#--------------------------------------------------------------------------------
bind-key n split-window -h -c /tmp 'vi sample-notes.txt'
bind-key w "new-window -d 'sleep 3'"

#----TMUX-SENSIBLE CUSTOMIZATION----------------------------------------------
# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# increase scrollback buffer size
set -g history-limit 50000

# tmux messages are displayed for 4 seconds
set -g display-time 4000

# refresh 'status-left' and 'status-right' more often
set -g status-interval 5
# Auto rename windows
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{pane_current_command}'

# upgrade $TERM
set -g default-terminal "screen-256color"

# emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys, even for vim users
set -g status-keys emacs

# focus events enabled for terminals that support them
set -g focus-events on

# Set vi keys for copy mode and system clipboard integration
set -s set-clipboard on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi 'Enter' send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle  # Block selection
bind-key -T copy-mode-vi 'Escape' send-keys -X cancel
# Additional paste bindings - both tmux buffer and system clipboard
bind-key p paste-buffer
bind-key P run "xclip -o -sel clipboard | tmux load-buffer - ; tmux paste-buffer"

#----PUT YOUR PLUGINS UNDER THIS LINE------------------------------------------

# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# TmuxResurrect: restore tmux environment after system restart
set -g @plugin 'tmux-plugins/tmux-resurrect'

# TmuxContinuum: Continuous saving of tmux environment. Autorestore when tmux is started. Autostart tmux when computer is turned on.
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-mode-indicator: mostra modo atual (prefix pressionado, copy mode, sync)
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @mode_indicator_empty_prompt  ' · '
set -g @mode_indicator_prefix_prompt ' C-t '
set -g @mode_indicator_copy_prompt   ' COPY '
set -g @mode_indicator_sync_prompt   ' SYNC '
set -g @mode_indicator_empty_mode_style  'fg=colour52,bg=colour232'
set -g @mode_indicator_prefix_mode_style 'fg=colour232,bg=colour160,bold'
set -g @mode_indicator_copy_mode_style   'fg=colour232,bg=colour208,bold'
set -g @mode_indicator_sync_mode_style   'fg=colour232,bg=colour196,bold'

# tmux-agent-indicator: feedback visual do estado do Claude Code
set -g @plugin 'accessd/tmux-agent-indicator'
set -g @agent-indicator-icons 'claude=,default='
set -g @agent-indicator-processes ''            # desativa detecção por processo; usa só hooks
set -g @agent-indicator-animation-enabled 'on' # Knight Rider em vermelho quando rodando
set -g @agent-indicator-notification-enabled 'on'
set -g @agent-indicator-notification-states 'needs-input,done'
set -g @agent-indicator-notification-duration '4000'

# tmux-weather: clima atual via wttr.in (sem API key, detecta localização por IP)
set -g @plugin 'xamut/tmux-weather'
set -g @tmux-weather-interval 15        # atualiza a cada 15 min
set -g @tmux-weather-units 'm'          # métrico (Celsius)
# set -g @tmux-weather-location 'Brasilia' # descomente para fixar cidade

# tmux-battery: mostra nível e status da bateria na statusbar
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @batt_color_full_charge    'colour160'   # vermelho médio = normal/ok
set -g @batt_color_high_charge    'colour160'   # vermelho médio = ainda ok
set -g @batt_color_medium_charge  'colour208'   # laranja = atenção
set -g @batt_color_low_charge     'colour196'   # vermelho vivo = alerta
set -g @batt_icon_status_charged     '='        # carregado (plugado, cheio)
set -g @batt_icon_status_charging    '+'        # carregando
set -g @batt_icon_status_discharging ''         # descarregando (sem ícone extra)
set -g @batt_icon_status_unknown     '?'

######################
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity on
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Red Cockpit — inspirado nos painéis de instrumentos dos anos 70/80
# Fundo escuro como cockpit apagado; vermelho fosforescente nos instrumentos ativos

# Red Cockpit — paleta calibrada para dia e noite sem trocar nada
#   colour160 = vermelho médio (legível no dia, não agride à noite)
#   colour208 = laranja queimado (âmbar mais contido que o amarelo puro)
#   colour88  = vermelho apagado (texto secundário/inativo)
#   colour52  = vermelho escuro (bordas e elementos estruturais)

setw -g clock-mode-colour colour160

# Status bar — fundo quase preto
set -g status-bg colour232
set -g status-fg colour88          # vermelho apagado como texto padrão

# Esquerda: modo atual + nome da sessão
set -g status-left-length 40
set -g status-left '#{tmux_mode_indicator} #[fg=colour160,bold]#S '

# Janela ativa: vermelho médio + fundo levemente destacado
setw -g window-status-current-style 'fg=colour160,bold,bg=colour52'
setw -g window-status-current-format ' #I:#W '

# Janelas inativas: vermelho apagado
setw -g window-status-style 'fg=colour88'
setw -g window-status-format ' #I:#W '

# Direita: agente | clima | bateria | data | hora
# Usa script próprio para checar estado global (funciona em qualquer janela)
set -g status-right '#(/home/mretka/my-dotfiles/tmux/agent-global-indicator.sh) #[fg=colour88]#{weather}  #[fg=#{battery_color_fg}]#{battery_percentage}#{battery_icon} #[fg=colour88] %d-%m-%Y #[fg=colour208,bold]%H:%M '
set -g status-right-length 110

# Bordas de pane
set -g pane-border-style 'fg=colour52'
set -g pane-active-border-style 'fg=colour160'

# Linha de comando/mensagens do tmux
set -g message-style 'fg=colour208,bold,bg=colour232'

# messages
bind r source-file ~/.tmux.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# See https://github.com/tmux/tmux/wiki/FAQ#how-do-i-use-rgb-colour.
set -as terminal-overrides ",xterm-256color:RGB"